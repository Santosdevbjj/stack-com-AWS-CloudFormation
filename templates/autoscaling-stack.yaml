AWSTemplateFormatVersion: '2010-09-09'

Description: >
  Auto Scaling Group para ajuste automático da quantidade
  de instâncias EC2.

Parameters:

  LatestAmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2

  InstanceType:
    Type: String
    Default: t2.micro

  SecurityGroupId:
    Type: AWS::EC2::SecurityGroup::Id

  PublicSubnet1:
    Type: AWS::EC2::Subnet::Id

  PublicSubnet2:
    Type: AWS::EC2::Subnet::Id

Resources:

  LaunchTemplate:

    Type: AWS::EC2::LaunchTemplate

    Properties:

      LaunchTemplateName: CloudFormationLaunchTemplate

      LaunchTemplateData:

        ImageId: !Ref LatestAmiId

        InstanceType: !Ref InstanceType

        SecurityGroupIds:

          - !Ref SecurityGroupId

        UserData:

          Fn::Base64: |
            #!/bin/bash
            yum update -y
            yum install -y httpd
            systemctl enable httpd
            systemctl start httpd
            echo "<h1>Hello World from Auto Scaling Group</h1>" > /var/www/html/index.html

  AutoScalingGroup:

    Type: AWS::AutoScaling::AutoScalingGroup

    Properties:

      MinSize: 1

      MaxSize: 3

      DesiredCapacity: 2

      VPCZoneIdentifier:

        - !Ref PublicSubnet1
        - !Ref PublicSubnet2

      LaunchTemplate:

        LaunchTemplateId: !Ref LaunchTemplate

        Version: !GetAtt LaunchTemplate.LatestVersionNumber

      Tags:

        - Key: Name
          Value: CloudFormation-ASG

          PropagateAtLaunch: true

        - Key: Project
          Value: CloudFormation-Lab

          PropagateAtLaunch: true

Outputs:

  AutoScalingGroupName:

    Description: Nome do Auto Scaling Group

    Value: !Ref AutoScalingGroup

  LaunchTemplateId:

    Description: ID do Launch Template

    Value: !Ref LaunchTemplate
