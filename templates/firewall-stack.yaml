AWSTemplateFormatVersion: '2010-09-09'

Description: >
  CloudFormation template para criação de um Security Group
  responsável por controlar o acesso SSH, HTTP e HTTPS.

Parameters:

  SSHLocation:
    Description: Endereço IP autorizado para acesso SSH
    Type: String
    Default: 0.0.0.0/0
    AllowedPattern: '^(\d{1,3}\.){3}\d{1,3}\/\d{1,2}$'
    ConstraintDescription: Deve estar no formato CIDR x.x.x.x/x.

  HTTPPort:
    Description: Porta HTTP
    Type: Number
    Default: 80

  HTTPSPort:
    Description: Porta HTTPS
    Type: Number
    Default: 443

  SSHPort:
    Description: Porta SSH
    Type: Number
    Default: 22

Resources:

  FirewallSecurityGroup:

    Type: AWS::EC2::SecurityGroup

    Properties:

      GroupDescription: Security Group para acesso SSH, HTTP e HTTPS

      SecurityGroupIngress:

        - IpProtocol: tcp
          FromPort: !Ref SSHPort
          ToPort: !Ref SSHPort
          CidrIp: !Ref SSHLocation

        - IpProtocol: tcp
          FromPort: !Ref HTTPPort
          ToPort: !Ref HTTPPort
          CidrIp: 0.0.0.0/0

        - IpProtocol: tcp
          FromPort: !Ref HTTPSPort
          ToPort: !Ref HTTPSPort
          CidrIp: 0.0.0.0/0

      SecurityGroupEgress:

        - IpProtocol: -1
          CidrIp: 0.0.0.0/0

      Tags:

        - Key: Name
          Value: FirewallSecurityGroup

        - Key: Project
          Value: CloudFormation-Lab

        - Key: Environment
          Value: Development

Outputs:

  SecurityGroupId:
    Description: ID do Security Group criado
    Value: !Ref FirewallSecurityGroup

  SecurityGroupName:
    Description: Nome do Security Group
    Value: FirewallSecurityGroup
