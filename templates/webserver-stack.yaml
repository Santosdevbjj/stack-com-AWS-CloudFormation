AWSTemplateFormatVersion: '2010-09-09'

Description: >
  CloudFormation template para provisionar uma instância EC2 com
  Apache Web Server e Security Group para acesso HTTP.

Parameters:

  LatestAmiId:
    Description: Amazon Linux 2 AMI mais recente
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2

  InstanceType:
    Description: Tipo da instância EC2
    Type: String
    Default: t2.micro
    AllowedValues:
      - t2.micro
      - t3.micro
    ConstraintDescription: Deve ser um tipo de instância válido.

  MyIP:
    Description: Endereço IP permitido para acesso HTTP
    Type: String
    Default: 0.0.0.0/0
    AllowedPattern: '^(\d{1,3}\.){3}\d{1,3}\/\d{1,2}$'
    ConstraintDescription: Deve estar no formato CIDR x.x.x.x/x.

Resources:

  WebServerSecurityGroup:

    Type: AWS::EC2::SecurityGroup

    Properties:

      GroupDescription: Permite acesso HTTP

      SecurityGroupIngress:

        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: !Ref MyIP

      Tags:

        - Key: Name
          Value: WebServerSecurityGroup

        - Key: Project
          Value: CloudFormation-Lab

  WebServer:

    Type: AWS::EC2::Instance

    Properties:

      ImageId: !Ref LatestAmiId

      InstanceType: !Ref InstanceType

      SecurityGroupIds:
        - !Ref WebServerSecurityGroup

      UserData:
        Fn::Base64: |
          #!/bin/bash
          yum update -y
          yum install -y httpd
          systemctl start httpd
          systemctl enable httpd
          echo "<html><body><h1>Hello World from AWS CloudFormation!</h1></body></html>" > /var/www/html/index.html

      Tags:

        - Key: Name
          Value: WebServer

        - Key: Environment
          Value: Development

        - Key: Project
          Value: CloudFormation-Lab

Outputs:

  InstanceId:
    Description: ID da instância EC2 criada
    Value: !Ref WebServer

  PublicIp:
    Description: Endereço IP público da instância
    Value: !GetAtt WebServer.PublicIp

  PublicDNS:
    Description: DNS público da instância
    Value: !GetAtt WebServer.PublicDnsName

  WebsiteURL:
    Description: URL do servidor Web
    Value: !Sub "http://${WebServer.PublicDnsName}"
